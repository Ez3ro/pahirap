<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Rounded app tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0b1220"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#1f2937" stroke-width="2"/>
  <!-- Budget ring: green progress arc on a track, echoing the in-app ring -->
  <circle cx="32" cy="32" r="19" fill="none" stroke="#374151" stroke-width="6"/>
  <circle cx="32" cy="32" r="19" fill="none" stroke="#22c55e" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="33"
          transform="rotate(-90 32 32)"/>
  <!-- Peso mark -->
  <text x="32" y="41" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="24" font-weight="700" fill="#f3f4f6">₱</text>
</svg>
